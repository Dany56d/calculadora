<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calculadora">
    <div class="pantalla">
      <div id="historial"></div>
      <div id="display">0</div>
    </div>
    <div class="botones">
      <button class="btn especial" onclick="limpiar()">C</button>
      <button class="btn especial" onclick="borrar()">⌫</button>
      <button class="btn especial" onclick="agregarOperador('%')">%</button>
      <button class="btn operador" onclick="agregarOperador('/')">÷</button>

      <button class="btn" onclick="agregarNumero('7')">7</button>
      <button class="btn" onclick="agregarNumero('8')">8</button>
      <button class="btn" onclick="agregarNumero('9')">9</button>
      <button class="btn operador" onclick="agregarOperador('*')">×</button>

      <button class="btn" onclick="agregarNumero('4')">4</button>
      <button class="btn" onclick="agregarNumero('5')">5</button>
      <button class="btn" onclick="agregarNumero('6')">6</button>
      <button class="btn operador" onclick="agregarOperador('-')">−</button>

      <button class="btn" onclick="agregarNumero('1')">1</button>
      <button class="btn" onclick="agregarNumero('2')">2</button>
      <button class="btn" onclick="agregarNumero('3')">3</button>
      <button class="btn operador" onclick="agregarOperador('+')">+</button>

      <button class="btn cero" onclick="agregarNumero('0')">0</button>
      <button class="btn" onclick="agregarNumero('.')">.</button>
      <button class="btn igual" onclick="calcular()">=</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
